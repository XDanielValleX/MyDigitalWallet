<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button fill="clear" color="medium">
        <ion-icon slot="icon-only" name="notifications-outline"></ion-icon>
      </ion-button>
      <ion-avatar (click)="openProfile()" (pointerup)="openProfile()" class="profile-avatar">
        <img src="/assets/avatar-placeholder.svg" alt="Profile" />
      </ion-avatar>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="welcome-header">
    <h1>Hello {{ firstName }}!</h1>
    <p>Let's save your money.</p>
  </div>

  <app-balance-display [totalBalance]="balance"></app-balance-display>

  <div class="card-display-container">
    <ng-container *ngIf="isLoading; else cardsLoaded">
      <app-skeleton-loading variant="card"></app-skeleton-loading>
    </ng-container>

    <ng-template #cardsLoaded>
      <ng-container *ngIf="selectedCard; else noCards">
        <div class="mdw-card-stack" [class.mdw-card-stack--multi]="visibleCards.length > 1">
          <div
            class="mdw-card-stack__item"
            *ngFor="let card of visibleCards; let i = index; trackBy: trackByCardId"
            [style.zIndex]="100 - i"
            [style.transform]="'translateY(' + ((visibleCards.length - 1 - i) * 12) + 'px) scale(' + (1 - i * 0.04) + ')'">
            <app-card
              [cardNumber]="card.cardNumber"
              [cardHolder]="card.cardHolder"
              [expDate]="card.expDate"
              [isActive]="true">
            </app-card>
          </div>
        </div>
      </ng-container>
    </ng-template>

    <ng-template #noCards>
      <div class="no-cards-state">
        <div class="placeholder-card-icon">
          <ion-icon name="card-outline"></ion-icon>
        </div>
        <p>No cards available.</p>
        <ion-button fill="solid" shape="round" size="small" (click)="addCard()">
          + ADD CARD
        </ion-button>
      </div>
    </ng-template>
  </div>

  <app-quick-actions [actions]="homeActions" (action)="onQuickAction($event)"></app-quick-actions>

  <div class="history-header">
    <h2>Card History</h2>
    <ion-note color="primary" role="button" tabindex="0" (click)="openTotalExpenses()" (pointerup)="openTotalExpenses()">View All</ion-note>
  </div>

  <ng-container *ngIf="isLoading; else historyLoaded">
    <app-skeleton-loading variant="transactions" [count]="3"></app-skeleton-loading>
  </ng-container>

  <ng-template #historyLoaded>
    <app-transaction-list [transactions]="transactions"></app-transaction-list>
  </ng-template>

</ion-content>
