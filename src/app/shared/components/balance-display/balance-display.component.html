<ion-card class="ion-text-center" style="box-shadow: none; border: 1px solid #333; background: #1e1e1e;">
  <ion-card-header>
    <ion-card-subtitle color="medium">Saldo Disponible</ion-card-subtitle>
  </ion-card-header>
  <ion-card-content>
    <h1 style="font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: white;">
      <span *ngIf="showBalance">{{ balance | currency:'COP':'symbol-narrow':'1.0-0' }}</span>
      <span *ngIf="!showBalance">••••••</span>
    </h1>

    <ion-button fill="clear" color="medium" (click)="toggleBalance()">
      <ion-icon slot="start" [name]="showBalance ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
      {{ showBalance ? 'Ocultar' : 'Mostrar' }} Saldo
    </ion-button>
  </ion-card-content>
</ion-card>
