<div class="balance-container">
  <div class="balance-info">
    <p class="balance-label">Total Balance</p>
    <div class="amount-wrapper">
      <h2 class="amount">
        {{ isVisible ? (totalBalance | currency:'USD':'symbol':'1.0-0') : '••••••' }}
      </h2>
      <ion-button fill="clear" (click)="toggleVisibility()" class="toggle-btn">
        <ion-icon slot="icon-only" [name]="isVisible ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
      </ion-button>
    </div>
  </div>
</div>
