<div class="quick-actions-grid">
  <button
    *ngFor="let a of actions"
    type="button"
    class="action-item ion-activatable"
    (click)="onAction(a.id)"
    (pointerup)="onAction(a.id)">
    <div class="icon-wrapper" [ngClass]="a.tone">
      <ion-icon [name]="a.icon"></ion-icon>
    </div>
    <span>{{ a.label }}</span>
    <ion-ripple-effect></ion-ripple-effect>
  </button>
</div>
